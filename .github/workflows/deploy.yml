name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install d2
        run: curl -fsSL https://d2lang.com/install.sh | sh -s --

      - name: Compile d2 files to SVG
        run: |
          find manual -name "*.d2" | while read f; do
            d2 "$f" "${f%.d2}.svg" 2>/dev/null || true
          done

      - name: Generate scenario manifests
        # Static stand-in for /api/manual/scenarios — the frontend falls back to
        # these scenarios.json files when the API is absent (GitHub Pages).
        run: node scripts/build-scenario-manifests.mjs

      - name: Build frontend
        run: npm run build
        env:
          CI: false

      - name: Copy manual and pointers.yaml into dist
        run: |
          # Exclude .d2/.mmd sources from the static Pages copy only. If a real
          # file exists at e.g. /manual/hi/seq_frontend.d2, GitHub Pages serves
          # it as a download instead of falling back to 404.html, breaking the
          # SPA route of the same name on hard refresh. The Heroku container is
          # unaffected: its Dockerfile COPYs manual/ (sources included) from the
          # repo, not from dist/.
          rsync -a --exclude='*.d2' --exclude='*.mmd' manual/ dist/manual/
          cp pointers.yaml dist/
          cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages
